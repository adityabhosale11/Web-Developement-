<!DOCTYPE html>
<html>
<head>
    <title>Grocery Table</title>
</head>
<body>

<h2>Grocery List</h2>

<table border="1" cellpadding="10" bgcolor="lightyellow">
    <tr bgcolor="green">
        <th>Sr No.</th>
        <th>Item Name</th>
        <th>Quantity</th>
        <th>Price</th>
        <th>Total</th>
    </tr>

    <tr>
        <td>1</td>
        <td>Rice</td>
        <td>2 kg</td>
        <td>50</td>
        <td>100</td>
    </tr>

    <tr bgcolor="lightgray">
        <td>2</td>
        <td>Wheat</td>
        <td>3 kg</td>
        <td>40</td>
        <td>120</td>
    </tr>

    <tr>
        <td>3</td>
        <td>Sugar</td>
        <td>1 kg</td>
        <td>45</td>
        <td>45</td>
    </tr>

    <tr bgcolor="lightgray">
        <td>4</td>
        <td>Salt</td>
        <td>1 packet</td>
        <td>20</td>
        <td>20</td>
    </tr>

    <tr>
        <td>5</td>
        <td>Milk</td>
        <td>2 litre</td>
        <td>30</td>
        <td>60</td>
    </tr>

    <tr bgcolor="lightgray">
        <td>6</td>
        <td>Oil</td>
        <td>1 litre</td>
        <td>150</td>
        <td>150</td>
    </tr>

    <tr>
        <td>7</td>
        <td>Tea</td>
        <td>500 g</td>
        <td>200</td>
        <td>200</td>
    </tr>

    <tr bgcolor="lightgray">
        <td>8</td>
        <td>Coffee</td>
        <td>200 g</td>
        <td>180</td>
        <td>180</td>
    </tr>

    <tr>
        <td>9</td>
        <td>Biscuits</td>
        <td>5 packets</td>
        <td>10</td>
        <td>50</td>
    </tr>

    <tr bgcolor="lightgray">
        <td>10</td>
        <td>Soap</td>
        <td>4 pcs</td>
        <td>25</td>
        <td>100</td>
    </tr>

    <tr bgcolor="orange">
        <td colspan="4"><b>Total Amount</b></td>
        <td><b>1025</b></td>
    </tr>

</table>

</body>
</html>
